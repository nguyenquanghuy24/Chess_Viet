upstream frontend_upstream { server frontend:3000; }
upstream auth_upstream { server auth-service:3001; }
upstream matchmaking_upstream { server matchmaking-service:3002; }
upstream game_upstream { server game-session-service:3003; }
upstream validation_upstream { server move-validation-service:3004; }
upstream websocket_upstream { server websocket-service:3005; }
upstream notification_upstream { server notification-service:3007; }
upstream chat_upstream { server chat-service:3009; }
upstream replay_upstream { server replay-service:3010; }
upstream ai_upstream { server ai-bot-service:3011; }

server {
  listen 80;
  server_name _;

  location /api/auth/ { proxy_pass http://auth_upstream/; }
  location /api/matchmaking/ { proxy_pass http://matchmaking_upstream/; }
  location = /api/games/health { proxy_pass http://game_upstream/health; }
  location = /api/games { proxy_pass http://game_upstream/games; }
  location /api/games/ { proxy_pass http://game_upstream/games/; }
  location /api/validate/ { proxy_pass http://validation_upstream/validate/; }
  location /api/notifications/ { proxy_pass http://notification_upstream/; }
  location /api/chat/ { proxy_pass http://chat_upstream/; }
  location /api/replay/ { proxy_pass http://replay_upstream/; }
  location /api/ai/ { proxy_pass http://ai_upstream/; }

  location /socket.io/ {
    proxy_pass http://websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
