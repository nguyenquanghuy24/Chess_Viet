global:
  scrape_interval: 10s

scrape_configs:
  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:3001
          - matchmaking-service:3002
          - game-session-service:3003
          - move-validation-service:3004
          - websocket-service:3005
          - leaderboard-service:3006
          - notification-service:3007
          - chat-service:3009
          - replay-service:3010
          - ai-bot-service:3011
